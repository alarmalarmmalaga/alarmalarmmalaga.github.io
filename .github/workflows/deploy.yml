name: Production Deployment

"on":
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Environment Variables (Diagnostic)
        run: |
          echo "Verifying Supabase Environment Variables..."
          FAILED=0
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_URL is NOT set"
            FAILED=1
          else
            echo "VITE_SUPABASE_URL is set (length: ${#VITE_SUPABASE_URL})"
          fi

          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY is NOT set"
            FAILED=1
          else
            echo "VITE_SUPABASE_ANON_KEY is set (length: ${#VITE_SUPABASE_ANON_KEY})"
          fi

          if [ $FAILED -ne 0 ]; then
            echo "Build failed: Required Supabase environment variables are missing."
            exit 1
          fi

      - name: Build project
        run: npm run build

      - name: Verify Build Artifacts
        run: |
          echo "Checking if 'dist' directory exists..."
          if [ ! -d "dist" ]; then
            echo "ERROR: 'dist' directory not found!"
            exit 1
          fi

          echo "Checking if Supabase URL is bundled in the build artifacts..."
          # Look for a partial match of the Supabase URL in the generated JS files
          # Note: We don't print the whole file to avoid leaking secrets, just checking existence.
          if grep -q "supabase.co" dist/assets/*.js 2>/dev/null; then
            echo "Found Supabase URL reference in JS artifacts."
          else
            echo "WARNING: Supabase URL NOT found in JS artifacts! This might be expected if no database calls are made during initial load."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
