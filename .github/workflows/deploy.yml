name: Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Environment Variables
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then echo "VITE_SUPABASE_URL is missing"; else echo "VITE_SUPABASE_URL is present"; fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then echo "VITE_SUPABASE_ANON_KEY is missing"; else echo "VITE_SUPABASE_ANON_KEY is present"; fi

      - name: Build project
        run: npm run build

      - name: Verify Build
        run: |
          if [ ! -d "dist" ]; then echo "Build failed: dist/ not found"; exit 1; fi
          grep -q "supabase.co" dist/assets/*.js 2>/dev/null && echo "Supabase URL found" || echo "Warning: Supabase URL not found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
